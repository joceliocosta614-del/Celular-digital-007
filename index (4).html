<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Jesus Cristo PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family: 'Poppins', sans-serif;
  color:white;
}

.container{
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius:25px;
  padding:20px;
  width:340px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9);} 
  to{opacity:1; transform:scale(1);} 
}

h1{
  font-size:18px;
}

#clock{
  color:#00ffcc;
  margin:10px 0;
}

#display{
  width:100%;
  height:55px;
  font-size:22px;
  border:none;
  border-radius:12px;
  text-align:right;
  padding:10px;
  margin-bottom:10px;
}

.buttons{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
}

button{
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:16px;
  background: rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  background: rgba(255,255,255,0.3);
}

.equal{ background:#00c853; grid-column:span 2; }
.clear{ background:#d50000; }
.speak{ background:#2962ff; margin-top:10px; width:100%; }

#history{
  margin-top:10px;
  max-height:100px;
  overflow:auto;
  font-size:12px;
  text-align:left;
}

.ad{
  margin-top:10px;
  background: rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

</style></head><body>
<div class="container"><h1>✝️ Calculadora Jesus Cristo PRO</h1>
<div id="clock"></div>
<input type="text" id="display" disabled><div class="buttons">
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button><button onclick="add('4')">4</button> <button onclick="add('5')">5</button> <button onclick="add('6')">6</button> <button onclick="add('*')">×</button>

<button onclick="add('1')">1</button> <button onclick="add('2')">2</button> <button onclick="add('3')">3</button> <button onclick="add('-')">−</button>

<button onclick="add('0')">0</button> <button onclick="add('.')">.</button> <button class="clear" onclick="clearDisplay()">C</button> <button onclick="add('+')">+</button>

<button class="equal" onclick="calculate()">=</button>

</div><button class="speak" onclick="speakResult()">🔊 Ouvir</button>

<div id="history"></div><div class="ad">✨ Espaço para anúncio (Google AdSense / Monetização)</div></div><script>
let display = document.getElementById("display");
let historyDiv = document.getElementById("history");

function clickSound(){
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
  audio.play();
}

function add(value){
  clickSound();
  display.value += value;
}

function clearDisplay(){
  clickSound();
  display.value = '';
}

function calculate(){
  clickSound();
  try{
    let result = eval(display.value);
    historyDiv.innerHTML += `<div>${display.value} = ${result}</div>`;
    display.value = result;
  }catch{
    display.value = 'Erro';
  }
}

function speakResult(){
  let expression = display.value;

  let readable = expression
    .replace(/\*/g, " vezes ")
    .replace(/\//g, " dividido por ")
    .replace(/\+/g, " mais ")
    .replace(/\-/g, " menos ");

  let msg = new SpeechSynthesisUtterance("O resultado é " + readable);
  msg.lang = "pt-BR";
  speechSynthesis.speak(msg);
}

function updateClock(){
  let now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

</script></body>
</html>
